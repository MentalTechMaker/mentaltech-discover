<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_mt.png" />
    <link rel="canonical" href="https://discover.mentaltech.fr/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MentalTech Discover - Découvrez les solutions digitales en santé mentale adaptées à vos besoins. Créé par MentalTechMaker pour le Collectif MentalTech."
    />
    <meta name="theme-color" content="#4A90E2" />

    <title>MentalTech Discover - Trouvez votre solution en santé mentale</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://discover.mentaltech.fr/" />
    <meta property="og:title" content="MentalTech Discover - Trouvez votre solution en santé mentale" />
    <meta property="og:description" content="Découvrez les solutions digitales en santé mentale adaptées à vos besoins. Créé par MentalTechMaker pour le Collectif MentalTech." />
    <meta property="og:image" content="https://discover.mentaltech.fr/og-image.png" />
    <meta property="og:site_name" content="MentalTech Discover" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://discover.mentaltech.fr/" />
    <meta name="twitter:title" content="MentalTech Discover - Trouvez votre solution en santé mentale" />
    <meta name="twitter:description" content="Découvrez les solutions digitales en santé mentale adaptées à vos besoins. Créé par MentalTechMaker pour le Collectif MentalTech." />
    <meta name="twitter:image" content="https://discover.mentaltech.fr/og-image.png" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Collectif MentalTech",
      "url": "https://mentaltech.fr",
      "logo": "https://discover.mentaltech.fr/logo_mt.png",
      "foundingDate": "2023",
      "description": "Premier écosystème français de santé mentale digitale",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "arnaud@mentaltechmaker.fr",
        "contactType": "customer support",
        "availableLanguage": "French"
      },
      "sameAs": [
        "https://github.com/mentaltechmaker/mentaltech-discover"
      ]
    }
    </script>

    <!-- Structured data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MentalTech Discover",
      "url": "https://discover.mentaltech.fr/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://discover.mentaltech.fr/catalog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-lRzI12Da2RVbd6brhmLIF.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
