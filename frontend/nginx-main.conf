# Configuration nginx principale pour utilisateur non-root

# Pas de directive 'user' car on est déjà en utilisateur non-root
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Types MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Pas de cache pour éviter les problèmes de permissions
    # Les fichiers statiques seront servis directement
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Inclure les configurations des sites
    include /etc/nginx/conf.d/*.conf;
}
